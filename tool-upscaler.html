<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="High-quality image upscaler for underground promo shots.">
    <link rel="canonical" href="https://www.horrorcore-reshare.com/tool-upscaler">
    <title>Image Upscaler | Creative Toolkit | Horrorcore Reshare</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Moonfire-dreamwalkers/horrorcore-reshare-public-assets/main/images/hr-icon.png">
    <link rel="stylesheet" href="index.css?v=7.8">
    <link rel="stylesheet" href="tools.css">
</head>
<body class="mr-theme">
    <div class="hr-background-container">
        <canvas id="hr-canvas"></canvas>
    </div>

    <main class="hr-container" style="padding-top: 100px; padding-bottom: 60px;">
        <div style="text-align: center; margin-bottom: 40px; padding: 0 20px;">
            <div class="dir-section-label">PROTOCOL_03</div>
            <h1 class="dir-title">IMAGE <span class="horror">UPSCALER</span></h1>
            <p style="color: var(--hr-blood); font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; max-width: 600px; margin: 15px auto;">NOTE: THIS TOOL RUNS ON YOUR DEVICE. PROCESSING SPEED DEPENDS ON YOUR HARDWARE. NO DATA IS UPLOADED.</p>
        </div>

        <div class="hr-glass" style="padding: 30px; border-radius: 20px;">
            <div id="upload-zone" class="file-drop" style="min-height: 200px; cursor: pointer;">
                <input type="file" id="file-input" style="display: none;" accept="image/*">
                <span style="font-size: 1.2rem; color: var(--hr-crimson);">[ CLICK OR DROP IMAGE ]</span>
                <small style="color: var(--hr-text-muted); font-family: 'Share Tech Mono', monospace;">SUPPORTED: JPG, PNG, WEBP</small>
            </div>

            <div id="upscale-interface" style="display: none; margin-top: 30px;">
                <div class="tool-preview-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 40px;">
                    <div class="preview-card" style="text-align: center;">
                        <div class="dir-section-label" style="font-size: 0.6rem; margin-bottom: 15px; padding: 5px 15px;">ORIGINAL</div>
                        <img id="orig-preview" style="max-width: 100%; border-radius: 12px; border: 1px solid var(--hr-glass-border);">
                    </div>
                    <div class="preview-card" style="text-align: center;">
                        <div class="dir-section-label" style="font-size: 0.6rem; margin-bottom: 15px; padding: 5px 15px;">UPSCALED</div>
                        <canvas id="upscale-canvas" style="max-width: 100%; border-radius: 12px; border: 1px solid var(--hr-crimson);"></canvas>
                    </div>
                </div>

                <div class="control-panel" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
                    <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center;">
                        <div class="input-group">
                            <label style="font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--hr-text-muted);">SCALE:</label>
                            <select id="scale-select" style="background: #000; border: 1px solid var(--hr-blood); color: #fff; padding: 10px; border-radius: 4px; font-family: 'Share Tech Mono', monospace;">
                                <option value="2">2X (PRINT READY)</option>
                                <option value="3">3X (HIGH DEF)</option>
                                <option value="4">4X (ULTRA)</option>
                            </select>
                        </div>
                        <label style="color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="enhance-toggle" checked> ENHANCE DETAILS
                        </label>
                    </div>

                    <div id="progress-container" style="display: none; width: 100%; max-width: 500px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span id="status-text" style="color: var(--hr-text-muted); font-size: 0.7rem; font-family: 'Share Tech Mono', monospace;">INITIALIZING...</span>
                            <span id="percent-text" style="color: var(--hr-crimson); font-size: 0.7rem; font-family: 'Share Tech Mono', monospace;">0%</span>
                        </div>
                        <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">
                            <div id="progress-bar" style="width: 0%; height: 100%; background: var(--hr-crimson); box-shadow: 0 0 15px var(--hr-crimson-glow); transition: width 0.1s;"></div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <button id="process-btn" class="hr-premium-btn" style="padding: 15px 40px; font-size: 1rem; border-color: var(--hr-crimson); color: #fff;">RECONSTRUCT IMAGE</button>
                        <button id="reset-btn" class="hr-premium-btn" style="padding: 15px 40px; font-size: 1rem; background: transparent; border-color: var(--hr-text-muted); color: var(--hr-text-muted);">RESET</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="main-v6.js?v=7.8" defer></script>
    <script>
        // High Quality Lanczos3 Resampler
        function lanczos3(x) {
            if (x === 0) return 1;
            if (x < -3 || x > 3) return 0;
            const piX = Math.PI * x;
            const piX3 = piX / 3;
            return (Math.sin(piX) * Math.sin(piX3)) / (piX * piX3);
        }

        async function upscaleImage(img, scale) {
            const width = img.width;
            const height = img.height;
            const newWidth = Math.floor(width * scale);
            const newHeight = Math.floor(height * scale);
            const enhance = document.getElementById('enhance-toggle').checked;

            const srcCanvas = document.createElement('canvas');
            srcCanvas.width = width;
            srcCanvas.height = height;
            const srcCtx = srcCanvas.getContext('2d');
            srcCtx.drawImage(img, 0, 0);
            const srcData = srcCtx.getImageData(0, 0, width, height).data;

            const dstCanvas = document.getElementById('upscale-canvas');
            dstCanvas.width = newWidth;
            dstCanvas.height = newHeight;
            const dstCtx = dstCanvas.getContext('2d');
            const dstImageData = dstCtx.createImageData(newWidth, newHeight);
            const dstData = dstImageData.data;

            const statusText = document.getElementById('status-text');
            const percentText = document.getElementById('percent-text');
            const progressBar = document.getElementById('progress-bar');
            document.getElementById('progress-container').style.display = 'block';

            for (let y = 0; y < newHeight; y++) {
                if (y % 15 === 0) {
                    const percent = Math.floor((y / newHeight) * 100);
                    progressBar.style.width = percent + '%';
                    percentText.innerText = percent + '%';
                    statusText.innerText = `PROCESSING ROWS: ${y} / ${newHeight}`;
                    await new Promise(r => setTimeout(r, 0));
                }

                const srcY = y / scale;
                const yMin = Math.floor(srcY - 2);
                const yMax = Math.ceil(srcY + 2);

                for (let x = 0; x < newWidth; x++) {
                    const srcX = x / scale;
                    const xMin = Math.floor(srcX - 2);
                    const xMax = Math.ceil(srcX + 2);

                    let r = 0, g = 0, b = 0, a = 0, weightSum = 0;

                    for (let iy = yMin; iy <= yMax; iy++) {
                        if (iy < 0 || iy >= height) continue;
                        const weightY = lanczos3(srcY - iy);
                        for (let ix = xMin; ix <= xMax; ix++) {
                            if (ix < 0 || ix >= width) continue;
                            const weightX = lanczos3(srcX - ix);
                            const weight = weightX * weightY;
                            const idx = (iy * width + ix) * 4;
                            r += srcData[idx] * weight;
                            g += srcData[idx + 1] * weight;
                            b += srcData[idx + 2] * weight;
                            a += srcData[idx + 3] * weight;
                            weightSum += weight;
                        }
                    }

                    const dstIdx = (y * newWidth + x) * 4;
                    dstData[dstIdx] = r / weightSum;
                    dstData[dstIdx + 1] = g / weightSum;
                    dstData[dstIdx + 2] = b / weightSum;
                    dstData[dstIdx + 3] = a / weightSum;
                }
            }

            dstCtx.putImageData(dstImageData, 0, 0);
            
            if (enhance) {
                statusText.innerText = 'ENHANCING TEXTURES...';
                applyEnhancement(dstCtx, newWidth, newHeight);
            }

            progressBar.style.width = '100%';
            percentText.innerText = '100%';
            statusText.innerText = 'RECONSTRUCTION COMPLETE';
            return dstCanvas;
        }

        function applyEnhancement(ctx, w, h) {
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                for (let c = 0; c < 3; c++) {
                    let v = data[i + c];
                    v = ((v / 255 - 0.5) * 1.1 + 0.5) * 255;
                    data[i + c] = Math.max(0, Math.min(255, v));
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const upscaleInterface = document.getElementById('upscale-interface');
        const origPreview = document.getElementById('orig-preview');
        const processBtn = document.getElementById('process-btn');
        const resetBtn = document.getElementById('reset-btn');
        let currentImg = null;

        uploadZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        currentImg = img;
                        origPreview.src = event.target.result;
                        upscaleInterface.style.display = 'block';
                        uploadZone.style.display = 'none';
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        resetBtn.onclick = () => {
            currentImg = null;
            upscaleInterface.style.display = 'none';
            uploadZone.style.display = 'flex';
            fileInput.value = '';
            document.getElementById('progress-container').style.display = 'none';
            processBtn.disabled = false;
            processBtn.style.display = 'inline-block';
            processBtn.innerText = 'RECONSTRUCT IMAGE';
            const dl = document.getElementById('dl-btn');
            if(dl) dl.remove();
        };

        processBtn.onclick = async () => {
            if (!currentImg) return;
            processBtn.disabled = true;
            processBtn.innerText = 'UPSCALE IN PROGRESS...';
            
            const scale = parseFloat(document.getElementById('scale-select').value);
            const canvas = await upscaleImage(currentImg, scale);
            
            const downloadBtn = document.createElement('button');
            downloadBtn.id = 'dl-btn';
            downloadBtn.innerText = 'DOWNLOAD HIGH-RES';
            downloadBtn.className = 'hr-premium-btn';
            downloadBtn.style.cssText = 'padding: 15px 40px; font-size: 1rem; background: #39ff14; border: 1px solid #39ff14; color: #000; font-weight: 800;';
            downloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/png');
                const originalName = fileInput.files[0] ? fileInput.files[0].name.split('.')[0] : 'upscaled';
                a.download = `${originalName}-upscaled.png`;
                a.click();
            };
            
            processBtn.parentElement.insertBefore(downloadBtn, processBtn);
            processBtn.style.display = 'none';
        };
    </script>
</body>
</html>
