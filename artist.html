    <!-- Dynamic Bootloader for Zero-Stale CDN Streaming -->
    <script>
        (async function () {
            // Hide body immediately to prevent Flash of Unstyled Content (FOUC)
            const hideStyle = document.createElement('style');
            hideStyle.id = 'hr-boot-hide';
            hideStyle.textContent = 'html { background-color: #030303; } body { opacity: 0 !important; }';
            document.head.appendChild(hideStyle);

            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const loadStyle = (href) => {
                return new Promise((resolve) => {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = href;
                    link.onload = resolve;
                    link.onerror = resolve; // Resolve anyway to avoid blocking page load if CDN is down
                    document.head.appendChild(link);
                });
            };
            const loadScript = (src, defer = false) => {
                return new Promise((resolve, reject) => {
                    const s = document.createElement('script');
                    s.src = src;
                    if (defer) s.defer = true;
                    s.onload = resolve;
                    s.onerror = reject;
                    document.head.appendChild(s);
                });
            };

            const revealPage = () => {
                const styleEl = document.getElementById('hr-boot-hide');
                if (styleEl) styleEl.remove();
                document.body.style.transition = 'opacity 0.4s ease';
                document.body.style.opacity = '1';
            };

            if (isLocal) {
                window.HR_BUILD_VERSION = 'local';
                await loadStyle('index.css');
                await loadScript('data.js');
                await loadScript('album-data.js');
                await loadScript('main-v6.js', true);
                window.hrReady = true;
                document.dispatchEvent(new CustomEvent('HRReady'));
                revealPage();
            } else {
                let version = 'main';
                let versionMismatch = false;
                try {
                    const res = await fetch('https://raw.githubusercontent.com/Moonfire-dreamwalkers/horrorcore-reshare-public-assets/main/build-version.json?t=' + Date.now(), { cache: 'no-store' });
                    if (res.ok) {
                        const data = await res.json();
                        if (data && data.version) {
                            version = data.version;
                            const activeVersion = localStorage.getItem('hr_active_build_version');
                            if (activeVersion && activeVersion !== version) {
                                versionMismatch = true;
                            }

                            if (!versionMismatch) {

                                localStorage.setItem('hr_active_build_version', version);

                            }
                        }
                    }
                } catch (e) {
                    console.warn('CDN bootloader failed to fetch latest version tag, using @main fallback:', e);
                }

                if (versionMismatch) {


                    if ('caches' in window) {


                        try {


                            const keys = await caches.keys();


                            await Promise.all(keys.map(key => caches.delete(key)));


                            if ('serviceWorker' in navigator) {


                                const regs = await navigator.serviceWorker.getRegistrations();


                                for (let r of regs) {


                                    await r.update();


                                }


                            }


                            localStorage.setItem('hr_active_build_version', version);


                            console.log('Cleared stale cache due to build mismatch, reloading...');


                            window.location.reload(true);


                            return;


                        } catch (err) {


                            console.error('Failed to clear cache on version mismatch:', err);


                        }


                    } else {


                        localStorage.setItem('hr_active_build_version', version);


                    }


                }

                window.HR_BUILD_VERSION = version;
                const base = `https://cdn.jsdelivr.net/gh/Moonfire-dreamwalkers/horrorcore-reshare-public-assets@${version}`;
                await loadStyle(`${base}/index.css`);
                await loadScript(`${base}/data.js`);
                await loadScript(`${base}/album-data.js`);
                await loadScript(`${base}/main-v6.js`, true);
                window.hrReady = true;
                document.dispatchEvent(new CustomEvent('HRReady'));
                revealPage();
            }
        })();
    </script>
