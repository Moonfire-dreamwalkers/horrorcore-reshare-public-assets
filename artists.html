    <!-- Dynamic Bootloader for Zero-Stale CDN Streaming -->
    <script>
        (async function () {
            // Hide body immediately to prevent Flash of Unstyled Content (FOUC)
            const hideStyle = document.createElement('style');
            hideStyle.id = 'hr-boot-hide';
            hideStyle.textContent = 'html { background-color: #030303; } body { opacity: 0 !important; }';
            document.head.appendChild(hideStyle);

            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const loadStyle = (href) => {
                return new Promise((resolve) => {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = href;
                    link.onload = resolve;
                    link.onerror = resolve; // Resolve anyway to avoid blocking page load if CDN is down
                    document.head.appendChild(link);
                });
            };
            const loadScript = (src, defer = false) => {
                return new Promise((resolve, reject) => {
                    const s = document.createElement('script');
                    s.src = src;
                    if (defer) s.defer = true;
                    s.onload = resolve;
                    s.onerror = reject;
                    document.head.appendChild(s);
                });
            };

            const revealPage = () => {
                const styleEl = document.getElementById('hr-boot-hide');
                if (styleEl) styleEl.remove();
                document.body.style.transition = 'opacity 0.4s ease';
                document.body.style.opacity = '1';
            };

            if (isLocal) {
                window.HR_BUILD_VERSION = 'local';
                await loadStyle('index.css');
                await loadScript('data.js');
                await loadScript('album-data.js');
                await loadScript('main-v6.js', true);
                window.hrReady = true;
                document.dispatchEvent(new CustomEvent('HRReady'));
                revealPage();
            } else {
                let version = 'main';
                let versionMismatch = false;
                try {
                    const res = await fetch('https://raw.githubusercontent.com/Moonfire-dreamwalkers/horrorcore-reshare-public-assets/main/build-version.json?t=' + Date.now(), { cache: 'no-store' });
                    if (res.ok) {
                        const data = await res.json();
                        if (data && data.version) {
                            version = data.version;
                            const activeVersion = localStorage.getItem('hr_active_build_version');
                            if (activeVersion && activeVersion !== version) {
                                versionMismatch = true;
                            }

                            if (!versionMismatch) {

                                localStorage.setItem('hr_active_build_version', version);

                            }
                        }
                    }
                } catch (e) {
                    console.warn('CDN bootloader failed to fetch latest version tag, using @main fallback:', e);
                }

                if (versionMismatch) {


                    if ('caches' in window) {


                        try {


                            const keys = await caches.keys();


                            await Promise.all(keys.map(key => caches.delete(key)));


                            if ('serviceWorker' in navigator) {


                                const regs = await navigator.serviceWorker.getRegistrations();


                                for (let r of regs) {


                                    await r.update();


                                }


                            }


                            localStorage.setItem('hr_active_build_version', version);


                            console.log('Cleared stale cache due to build mismatch, reloading...');


                            window.location.reload(true);


                            return;


                        } catch (err) {


                            console.error('Failed to clear cache on version mismatch:', err);


                        }


                    } else {


                        localStorage.setItem('hr_active_build_version', version);


                    }


                }

                window.HR_BUILD_VERSION = version;
                const base = `https://cdn.jsdelivr.net/gh/Moonfire-dreamwalkers/horrorcore-reshare-public-assets@${version}`;
                await loadStyle(`${base}/index.css`);
                await loadScript(`${base}/data.js`);
                await loadScript(`${base}/album-data.js`);
                await loadScript(`${base}/main-v6.js`, true);
                window.hrReady = true;
                document.dispatchEvent(new CustomEvent('HRReady'));
                revealPage();
            }
        })();
    </script>

    <!-- Data dependencies & JS script execution -->
    <script>
        const initArtistsDirectory = () => {
            const searchInput = document.getElementById('library-search-input');

            function filterArtists() {
                const query = searchInput.value.toLowerCase();
                const cards = document.querySelectorAll('.ytm-artist-card');

                cards.forEach(card => {
                    const name = card.querySelector('.ytm-artist-card-name').textContent.toLowerCase();
                    if (name.includes(query)) {
                        card.style.display = '';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }

            if (searchInput) {
                searchInput.addEventListener('input', filterArtists);
            }

            // Dynamically inject ItemList structured schema for artists with full descriptions
            if (typeof artistData !== 'undefined') {
                const schema = {
                    "@context": "https://schema.org",
                    "@type": "ItemList",
                    "name": "Horrorcore Reshare Artist Directory",
                    "description": "Browse the underground artist directory. Find horrorcore, dark trap, and industrial music profiles, social links, and official releases.",
                    "numberOfItems": artistData.length,
                    "itemListElement": artistData.map((artist, idx) => ({
                        "@type": "ListItem",
                        "position": idx + 1,
                        "item": {
                            "@type": "MusicGroup",
                            "name": artist.name,
                            "url": `${window.location.origin}/artist?name=${encodeURIComponent(artist.name)}`,
                            "image": artist.img && !artist.img.startsWith('http') ? `${window.location.origin}/${artist.img}` : artist.img,
                            "description": artist.description || "",
                            "genre": "Horrorcore"
                        }
                    }))
                };
                const scriptEl = document.createElement('script');
                scriptEl.type = 'application/ld+json';
                scriptEl.text = JSON.stringify(schema);
                document.head.appendChild(scriptEl);

                // BreadcrumbList for artists directory
                const breadcrumb = {
                    "@context": "https://schema.org",
                    "@type": "BreadcrumbList",
                    "itemListElement": [
                        {
                            "@type": "ListItem",
                            "position": 1,
                            "name": "Home",
                            "item": `${window.location.origin}/`
                        },
                        {
                            "@type": "ListItem",
                            "position": 2,
                            "name": "Artists",
                            "item": `${window.location.origin}/artists`
                        }
                    ]
                };
                const bcEl = document.createElement('script');
                bcEl.type = 'application/ld+json';
                bcEl.text = JSON.stringify(breadcrumb);
                document.head.appendChild(bcEl);
            }
        };
        if (window.hrReady) {
            initArtistsDirectory();
        } else {
            document.addEventListener('HRReady', initArtistsDirectory);
        }
    </script>
