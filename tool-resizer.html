<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bulk image upscaler for professional promote batches.">
    <link rel="canonical" href="https://www.horrorcore-reshare.com/tool-resizer">
    <title>Bulk Upscaler | Creative Toolkit | Horrorcore Reshare</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Moonfire-dreamwalkers/horrorcore-reshare-public-assets/main/images/hr-icon.png">
    <link rel="stylesheet" href="index.css?v=7.8">
    <link rel="stylesheet" href="tools.css">
</head>
<body class="mr-theme">
    <div class="hr-background-container">
        <canvas id="hr-canvas"></canvas>
    </div>

    <main class="hr-container" style="padding-top: 100px; padding-bottom: 60px;">
        <div style="text-align: center; margin-bottom: 40px; padding: 0 20px;">
            <div class="dir-section-label">PROTOCOL_07</div>
            <h1 class="dir-title">BULK <span class="horror">UPSCALER</span></h1>
            <p style="color: var(--hr-blood); font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; max-width: 600px; margin: 15px auto;">NOTE: THIS TOOL RUNS ON YOUR DEVICE. BATCH PROCESSING IS RESOURCE INTENSIVE.</p>
        </div>

        <div class="hr-glass" style="padding: 30px; border-radius: 20px;">
            <div id="upload-zone" class="file-drop" style="min-height: 200px; cursor: pointer;">
                <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
                <span style="font-size: 1.2rem; color: var(--hr-crimson);">[ CLICK OR DROP IMAGES ]</span>
                <small style="color: var(--hr-text-muted); font-family: 'Share Tech Mono', monospace;">SUPPORTED: JPG, PNG, WEBP</small>
            </div>

            <div id="process-zone" style="display: none; margin-top: 30px;">
                <div class="tool-preview-grid" style="display: grid; grid-template-columns: 1fr 350px; gap: 30px;">
                    <div class="file-list-container" style="background: rgba(0,0,0,0.3); border: 1px solid var(--hr-glass-border); border-radius: 12px; padding: 20px; max-height: 400px; overflow-y: auto;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                            <h3 style="font-family: 'Share Tech Mono', monospace; margin: 0; font-size: 0.9rem;">BATCH LIST (<span id="batch-count">0</span>)</h3>
                            <button class="hr-link-text" onclick="document.getElementById('file-input').click()" style="background: none; border: none; cursor: pointer;">+ ADD MORE</button>
                        </div>
                        <div id="file-list">
                            <!-- Files injected by JS -->
                        </div>
                    </div>

                    <div class="control-panel hr-glass" style="padding: 25px; border-radius: 12px;">
                        <div class="panel-block" style="margin-bottom: 25px;">
                            <h3 style="font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--hr-crimson); margin-bottom: 15px;">UPSCALE CONFIG</h3>
                            <div class="input-group" style="margin-bottom: 15px;">
                                <label style="display: block; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--hr-text-muted); margin-bottom: 5px;">MULTIPLIER:</label>
                                <select id="scale-select" style="width: 100%; background: #000; border: 1px solid var(--hr-blood); color: #fff; padding: 10px; border-radius: 4px; font-family: 'Share Tech Mono', monospace;">
                                    <option value="2">2X (STANDARD)</option>
                                    <option value="3">3X (HIGH-RES)</option>
                                    <option value="4">4X (ULTRA-HD)</option>
                                </select>
                            </div>
                            <label style="color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                <input type="checkbox" id="enhance-toggle" checked> ENHANCE DETAILS
                            </label>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
                            <button id="process-btn" class="hr-premium-btn" style="width: 100%; padding: 15px; background: var(--hr-blood); color: #fff;">START BATCH PROCESS</button>
                            <button id="reset-btn" style="background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--hr-text-muted); padding: 10px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; cursor: pointer;">RESET BATCH</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="main-v6.js?v=7.8" defer></script>
    <script>
        const fileInput = document.getElementById('file-input');
        const uploadZone = document.getElementById('upload-zone');
        const processZone = document.getElementById('process-zone');
        const fileList = document.getElementById('file-list');
        const processBtn = document.getElementById('process-btn');
        const resetBtn = document.getElementById('reset-btn');

        let filesToProcess = [];

        uploadZone.onclick = () => fileInput.click();
        resetBtn.onclick = () => {
            filesToProcess = [];
            uploadZone.style.display = 'flex';
            processZone.style.display = 'none';
            fileInput.value = '';
            processBtn.disabled = false;
            processBtn.innerText = "START BATCH PROCESS";
            processBtn.style.background = 'var(--hr-blood)';
        };

        fileInput.onchange = (e) => {
            const newFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            filesToProcess = [...filesToProcess, ...newFiles];
            if (filesToProcess.length > 0) {
                uploadZone.style.display = 'none';
                processZone.style.display = 'grid';
                renderList();
            }
        };

        function renderList() {
            document.getElementById('batch-count').innerText = filesToProcess.length;
            fileList.innerHTML = filesToProcess.map((f, i) => `
                <div class="file-item" style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;">
                    <span style="color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px;">${f.name}</span>
                    <span class="status" style="color: var(--hr-text-muted);">READY</span>
                </div>
            `).join('');
        }

        function lanczos3(x) {
            if (x === 0) return 1;
            if (x < -3 || x > 3) return 0;
            const piX = Math.PI * x;
            const piX3 = piX / 3;
            return (Math.sin(piX) * Math.sin(piX3)) / (piX * piX3);
        }

        async function upscaleImage(img, scale, enhance) {
            const width = img.width;
            const height = img.height;
            const newWidth = Math.floor(width * scale);
            const newHeight = Math.floor(height * scale);

            const srcCanvas = document.createElement('canvas');
            srcCanvas.width = width;
            srcCanvas.height = height;
            const srcCtx = srcCanvas.getContext('2d');
            srcCtx.drawImage(img, 0, 0);
            const srcData = srcCtx.getImageData(0, 0, width, height).data;

            const dstCanvas = document.createElement('canvas');
            dstCanvas.width = newWidth;
            dstCanvas.height = newHeight;
            const dstCtx = dstCanvas.getContext('2d');
            const dstImageData = dstCtx.createImageData(newWidth, newHeight);
            const dstData = dstImageData.data;

            for (let y = 0; y < newHeight; y++) {
                const srcY = y / scale;
                const yMin = Math.floor(srcY - 2);
                const yMax = Math.ceil(srcY + 2);
                for (let x = 0; x < newWidth; x++) {
                    const srcX = x / scale;
                    const xMin = Math.floor(srcX - 2);
                    const xMax = Math.ceil(srcX + 2);
                    let r = 0, g = 0, b = 0, a = 0, weightSum = 0;
                    for (let iy = yMin; iy <= yMax; iy++) {
                        if (iy < 0 || iy >= height) continue;
                        const weightY = lanczos3(srcY - iy);
                        for (let ix = xMin; ix <= xMax; ix++) {
                            if (ix < 0 || ix >= width) continue;
                            const weightX = lanczos3(srcX - ix);
                            const weight = weightX * weightY;
                            const idx = (iy * width + ix) * 4;
                            r += srcData[idx] * weight;
                            g += srcData[idx + 1] * weight;
                            b += srcData[idx + 2] * weight;
                            a += srcData[idx + 3] * weight;
                            weightSum += weight;
                        }
                    }
                    const dstIdx = (y * newWidth + x) * 4;
                    dstData[dstIdx] = r / weightSum;
                    dstData[dstIdx + 1] = g / weightSum;
                    dstData[dstIdx + 2] = b / weightSum;
                    dstData[dstIdx + 3] = a / weightSum;
                }
            }
            dstCtx.putImageData(dstImageData, 0, 0);
            
            if (enhance) {
                const imgData = dstCtx.getImageData(0, 0, newWidth, newHeight);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    for (let c = 0; c < 3; c++) {
                        let v = data[i + c];
                        v = ((v / 255 - 0.5) * 1.1 + 0.5) * 255;
                        data[i + c] = Math.max(0, Math.min(255, v));
                    }
                }
                dstCtx.putImageData(imgData, 0, 0);
            }
            return dstCanvas;
        }

        processBtn.onclick = async () => {
            const zip = new JSZip();
            const scale = parseFloat(document.getElementById('scale-select').value);
            const enhance = document.getElementById('enhance-toggle').checked;
            
            processBtn.disabled = true;
            processBtn.innerText = "PROCESSING...";

            for (let i = 0; i < filesToProcess.length; i++) {
                const file = filesToProcess[i];
                const statusEl = fileList.children[i].querySelector('.status');
                statusEl.innerText = "WORKING...";
                
                const img = await loadImage(file);
                const canvas = await upscaleImage(img, scale, enhance);

                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
                zip.file(`${file.name.split('.')[0]}-highres.jpg`, blob);
                
                statusEl.innerText = "DONE";
                statusEl.style.color = "#39ff14";
            }

            const content = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'horrorcore-bulk-upscale.zip';
            a.click();
            
            processBtn.innerText = "BATCH COMPLETE";
            processBtn.style.background = "#39ff14";
            processBtn.style.color = "#000";
        };

        function loadImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
