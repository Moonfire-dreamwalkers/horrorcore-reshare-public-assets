<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered background removal tool for underground artists.">
    <link rel="canonical" href="https://www.horrorcore-reshare.com/tool-cropper">
    <title>BG Remover | Creative Toolkit | Horrorcore Reshare</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Moonfire-dreamwalkers/horrorcore-reshare-public-assets/main/images/hr-icon.png">
    <link rel="stylesheet" href="index.css?v=7.8">
    <link rel="stylesheet" href="tools.css">
</head>
<body class="mr-theme">
    <div id="loading-overlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(20px);">
        <div class="dir-section-label" style="margin-bottom: 30px;">AI SEGMENTATION ACTIVE</div>
        <div style="width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
            <div id="loading-bar" style="width: 0%; height: 100%; background: var(--hr-crimson); box-shadow: 0 0 15px var(--hr-crimson-glow); transition: width 0.3s;"></div>
        </div>
        <p id="loading-text" style="color: var(--hr-text-muted); font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; margin-top: 20px; letter-spacing: 1px;">DOWNLOADING NEURAL MODEL...</p>
    </div>

    <div class="hr-background-container">
        <canvas id="hr-canvas"></canvas>
    </div>

    <main class="hr-container" style="padding-top: 100px; padding-bottom: 60px;">
        <div style="text-align: center; margin-bottom: 40px; padding: 0 20px;">
            <div class="dir-section-label">PROTOCOL_02</div>
            <h1 class="dir-title">BG <span class="horror">REMOVER</span></h1>
            <p style="color: var(--hr-blood); font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; max-width: 600px; margin: 15px auto;">NOTE: THIS TOOL RUNS ENTIRELY ON YOUR DEVICE. PROCESSING SPEED DEPENDS ON YOUR HARDWARE.</p>
        </div>

        <div class="hr-glass" style="padding: 30px; border-radius: 20px;">
            <div id="upload-zone" class="file-drop" style="min-height: 200px; cursor: pointer;">
                <input type="file" id="file-input" style="display: none;" accept="image/*">
                <span style="font-size: 1.2rem; color: var(--hr-crimson);">[ CLICK OR DROP IMAGE ]</span>
                <small style="color: var(--hr-text-muted); font-family: 'Share Tech Mono', monospace;">SUPPORTED: JPG, PNG, WEBP</small>
            </div>

            <div id="result-zone" style="display: none; margin-top: 30px;">
                <div class="tool-preview-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 40px;">
                    <div class="preview-card" style="text-align: center;">
                        <div class="dir-section-label" style="font-size: 0.6rem; margin-bottom: 15px; padding: 5px 15px;">ORIGINAL</div>
                        <img id="orig-preview" style="max-width: 100%; border-radius: 12px; border: 1px solid var(--hr-glass-border);">
                    </div>
                    <div class="preview-card" style="text-align: center;">
                        <div class="dir-section-label" style="font-size: 0.6rem; margin-bottom: 15px; padding: 5px 15px;">TRANSPARENT RESULT</div>
                        <div style="background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%); background-size: 20px 20px; border-radius: 12px; border: 1px solid var(--hr-crimson); overflow: hidden;">
                            <img id="result-preview" style="max-width: 100%; display: block; margin: 0 auto;">
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button id="reset-btn" class="hr-premium-btn" style="padding: 15px 40px; font-size: 1rem; background: transparent; border-color: var(--hr-text-muted); color: var(--hr-text-muted);">RESET TOOL</button>
                    <button id="download-btn" class="hr-premium-btn" style="padding: 15px 40px; font-size: 1rem; background: #39ff14; border-color: #39ff14; color: #000; font-weight: 800;">DOWNLOAD PNG</button>
                </div>
            </div>
        </div>
    </main>

    <script src="main-v6.js?v=7.8" defer></script>
    <script type="module">
        let removeBackground;
        
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const resultZone = document.getElementById('result-zone');
        const origPreview = document.getElementById('orig-preview');
        const resultPreview = document.getElementById('result-preview');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingBar = document.getElementById('loading-bar');
        const loadingText = document.getElementById('loading-text');

        uploadZone.onclick = () => fileInput.click();
        resetBtn.onclick = () => location.reload();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                origPreview.src = event.target.result;
            };
            reader.readAsDataURL(file);

            loadingOverlay.style.display = 'flex';
            loadingBar.style.width = '5%';
            
            try {
                if (!removeBackground) {
                    loadingText.innerText = "LOADING AI ENGINE (50MB)...";
                    const module = await import("https://esm.sh/@imgly/background-removal@1.4.5");
                    removeBackground = module.removeBackground;
                }

                loadingText.innerText = "INITIALIZING NEURAL ENGINE...";
                loadingBar.style.width = '20%';
                
                const blob = await removeBackground(file, {
                    debug: false,
                    progress: (handle, progress) => {
                        const percent = Math.floor(progress * 100);
                        loadingBar.style.width = percent + '%';
                        loadingText.innerText = `SCANNING PIXELS: ${percent}%`;
                    }
                });

                const url = URL.createObjectURL(blob);
                resultPreview.src = url;
                
                loadingOverlay.style.display = 'none';
                uploadZone.style.display = 'none';
                resultZone.style.display = 'block';
                
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    const originalName = file.name.split('.')[0];
                    a.download = `${originalName}-transparent.png`;
                    a.click();
                };

            } catch (error) {
                console.error("BG Removal Error:", error);
                loadingText.innerText = "ERROR: " + error.message;
                loadingBar.style.backgroundColor = "var(--hr-blood)";
                setTimeout(() => {
                    alert("AI Processing Failed: " + error.message);
                    loadingOverlay.style.display = 'none';
                }, 1000);
            }
        };
    </script>
</body>
</html>
